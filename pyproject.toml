[project]
name = "battleship-pygame-lan"
version = "0.1.0"
description = "LAN Game of battleships, made with pygame."
readme = "README.md"
authors = [
    { name = "Szymon P", email = "szymon_jozef@proton.me" }
]
requires-python = ">=3.13"
dependencies = [
    "pygame>=2.6.1",
]

[project.scripts]
battleship-pygame-lan = "battleship_pygame_lan:main"

[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 88

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
select = ["E", "F", "I"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
