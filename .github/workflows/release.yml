name: Build and Release Binaries

on:
  workflow_dispatch:
  release:
    types: [published] 

permissions:
  contents: write 

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies and pyinstaller
        run: |
          uv venv
          uv pip install .
          uv pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed --name "Battleships-LAN-${{ runner.os }}" --collect-all battleship_pygame_lan src/battleship_pygame_lan/__main__.py

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "Battleships-LAN-${{ runner.os }}.zip" "Battleships-LAN-${{ runner.os }}.app"

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Battleships-LAN-* 
